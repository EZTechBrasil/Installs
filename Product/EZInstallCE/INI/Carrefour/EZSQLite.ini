[Application]
Name=EZSQLite configuration
IniVersion=1.00

[Parameters]
UseNV=False
DBName=\NDFlash\SQLite\EzDB.SQL 
DeliveryKeepDays=3
MaxDeliveries=10000
EventsKeepDays=10
MaxLogEvents=1000
SaleItemKeepDays=3
MaxSaleItems=1000
KeepCacheSeconds=300 
CachedEventsOnly=true 
BackupTime=03:15
RebootMemorySizePercent=20
BackupOnBoot=false
DeleteBatchSize=100
BetweenBatchWait=500

[Commands]
Cmd1=PRAGMA foreign_keys = ON; 
Cmd2=PRAGMA cache_size = 5000;
Cmd3=PRAGMA temp_store = MEMORY;
Cmd4=PRAGMA journal_mode = OFF;
Cmd5=PRAGMA busy_timeout = 5000;
Cmd6=PRAGMA synchronous = FULL;

[Log]
LogLevel=1
