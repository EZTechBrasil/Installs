[Application]
Name=EZSQLite configuration
IniVersion=1.00

[Parameters]
UseNV=false
DBName=/usr/ezlx/var/EzDB.sql
DeliveryKeepDays=3
MaxDeliveries=50000
EventsKeepDays=10
MaxLogEvents=10000
SaleItemKeepDays=3
MaxSaleItems=10000
KeepCacheSeconds=300 
CachedEventsOnly=true 
BackupTime=03:15
BackupOnBoot=false
DeleteBatchSize=500
BetweenBatchWait=100

[Commands]
Cmd1=PRAGMA foreign_keys = ON; 
Cmd2=PRAGMA cache_size = 500;
Cmd3=PRAGMA temp_store = MEMORY;
Cmd4=PRAGMA synchronous = NORMAL;
Cmd5=PRAGMA busy_timeout = 5000;
Cmd6=PRAGMA journal_mode = WAL;

[Log]
LogLevel=1 
